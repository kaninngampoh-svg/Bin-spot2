<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bin Spot — ถังขยะใกล้มหาวิทยาลัยราชภัฏจอมบึง</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Chakra+Petch:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #0f3d25;
      --green-mid:    #1a5c38;
      --green-bright: #27ae60;
      --green-light:  #d4edda;
      --cream:        #f5f0e8;
      --ink:          #0f1a12;
      --muted:        #4a6352;
      --red:          #e74c3c;
      --gold:         #f0b429;
      --white:        #ffffff;
      --shadow:       0 4px 24px rgba(0,0,0,0.18);
      --shadow-sm:    0 2px 8px rgba(0,0,0,0.12);
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--green-dark);
      min-height: 100vh;
      color: var(--ink);
    }

    /* ───── HEADER ───── */
    .header {
      background: var(--cream);
      border-bottom: 3px solid var(--green-bright);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo {
      width: 40px;
      height: 40px;
      background: var(--green-mid);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-title {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--green-dark);
      line-height: 1.1;
    }

    .header-sub {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
      margin-top: 2px;
    }

    .header-stats {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .stat-pill {
      background: var(--green-mid);
      color: var(--white);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .stat-pill .dot {
      width: 7px; height: 7px;
      background: var(--green-bright);
      border-radius: 50%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    /* ───── MAIN ───── */
    .main {
      display: grid;
      grid-template-columns: 1fr 300px;
      height: calc(100vh - 72px);
    }

    /* ───── MAP ───── */
    #map {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ───── SIDEBAR ───── */
    .sidebar {
      background: var(--cream);
      border-left: 2px solid rgba(39,174,96,0.25);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }

    .sidebar-label {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Mode toggle */
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: rgba(0,0,0,0.06);
      border-radius: 10px;
      padding: 3px;
      gap: 3px;
    }

    .mode-btn {
      border: none;
      border-radius: 8px;
      padding: 8px 6px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
    }

    .mode-btn.active {
      background: var(--green-mid);
      color: var(--white);
      box-shadow: var(--shadow-sm);
    }

    /* My location button */
    .btn-locate {
      width: 100%;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--green-mid);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-locate:hover { background: var(--green-bright); }
    .btn-locate:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-reset {
      width: 100%;
      border: 2px solid var(--green-mid);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--green-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-reset:hover { background: var(--green-light); }

    .btn-clear {
      width: 100%;
      border: 2px solid var(--red);
      border-radius: 10px;
      padding: 8px 14px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: transparent;
      color: var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
      display: none;
    }
    .btn-clear.visible { display: flex; }
    .btn-clear:hover { background: #fdecea; }

    /* Add mode hint */
    .add-hint {
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      border: 1.5px solid var(--green-bright);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 0.78rem;
      color: var(--green-dark);
      line-height: 1.5;
      display: none;
    }
    .add-hint.visible { display: block; }

    /* Feed */
    .feed-empty {
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
      padding: 20px 10px;
    }

    .feed-item {
      background: var(--white);
      border-radius: 10px;
      padding: 10px 12px;
      margin-bottom: 8px;
      border: 1px solid rgba(0,0,0,0.07);
      transition: all 0.2s;
      cursor: pointer;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .feed-item:hover { border-color: var(--green-bright); box-shadow: var(--shadow-sm); }

    .feed-item-title {
      font-weight: 700;
      font-size: 0.82rem;
      color: var(--ink);
      margin-bottom: 3px;
    }

    .feed-item-meta {
      font-size: 0.72rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .feed-badge {
      display: inline-block;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.68rem;
      font-weight: 700;
    }
    .badge-preset { background: var(--green-light); color: var(--green-dark); }
    .badge-new    { background: #fff3cd; color: #7d5a00; }

    /* ───── MODAL ───── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15,26,18,0.65);
      backdrop-filter: blur(4px);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--cream);
      border-radius: 16px;
      padding: 24px;
      width: 340px;
      max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      transform: scale(0.95);
      transition: transform 0.2s;
    }
    .modal-backdrop.open .modal { transform: scale(1); }

    .modal-title {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--green-dark);
      margin-bottom: 4px;
    }
    .modal-coords {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 16px;
      font-family: monospace;
    }

    .modal label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .modal input[type="text"] {
      width: 100%;
      border: 2px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      padding: 9px 12px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.9rem;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;
    }
    .modal input:focus { border-color: var(--green-bright); }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-cancel {
      border: 2px solid rgba(0,0,0,0.15);
      border-radius: 8px;
      padding: 9px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }
    .btn-cancel:hover { background: rgba(0,0,0,0.06); }

    .btn-confirm {
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-family: 'Sarabun', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      background: var(--green-mid);
      color: var(--white);
      transition: all 0.15s;
    }
    .btn-confirm:hover { background: var(--green-bright); }

    /* ───── TOAST ───── */
    .toast-wrap {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 600;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--ink);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0;
      transform: translateY(10px);
      animation: toastIn 0.25s ease forwards, toastOut 0.25s ease 2.5s forwards;
      white-space: nowrap;
    }
    @keyframes toastIn  { to { opacity:1; transform:translateY(0); } }
    @keyframes toastOut { to { opacity:0; transform:translateY(6px); } }

    /* ───── LOADING OVERLAY ───── */
    #loading-overlay {
      position:fixed; inset:0; background:var(--green-dark);
      display:flex; align-items:center; justify-content:center;
      z-index:999; transition:opacity 0.4s;
    }
    #loading-overlay.hidden { opacity:0; pointer-events:none; }
    .loading-inner { text-align:center; color:var(--white); }
    .loading-icon { font-size:3rem; animation:bounce 0.8s ease-in-out infinite alternate; }
    @keyframes bounce { to { transform:translateY(-12px); } }
    .loading-text {
      margin-top:14px;
      font-family:'Chakra Petch',sans-serif;
      font-size:1.1rem;
      color:var(--green-bright);
    }

    /* ───── RESPONSIVE ───── */
    @media (max-width: 700px) {
      .main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      .sidebar { height: auto; max-height: 240px; border-left: none; border-top: 2px solid rgba(39,174,96,0.25); }
      .header-stats { display: none; }
    }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-overlay">
  <div class="loading-inner">
    <div class="loading-icon">🗑️</div>
    <div class="loading-text">กำลังโหลดแผนที่...</div>
  </div>
</div>

<!-- Header -->
<header class="header">
  <div class="header-brand">
    <div class="header-logo">🗑️</div>
    <div>
      <div class="header-title">Bin Spot</div>
      <div class="header-sub">มหาวิทยาลัยราชภัฏจอมบึง</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-pill">
      <span class="dot"></span>
      <span>Live · <span id="binCount">0</span> จุด</span>
    </div>
  </div>
</header>

<!-- Main -->
<div class="main">
  <div id="map"></div>

  <aside class="sidebar">
    <!-- Mode -->
    <div class="sidebar-section">
      <div class="sidebar-label">โหมด</div>
      <div class="mode-toggle">
        <button class="mode-btn active" id="btn-view-mode" onclick="setMode('view')">🔍 ดูเส้นทาง</button>
        <button class="mode-btn" id="btn-add-mode"  onclick="setMode('add')">📍 เพิ่มจุดใหม่</button>
      </div>
      <div class="add-hint" id="add-hint">
        💡 คลิกที่แผนที่เพื่อปักหมุดถังขยะจุดใหม่<br>ทุกคนจะเห็นทันทีแบบเรียลไทม์
      </div>
    </div>

    <!-- Controls -->
    <div class="sidebar-section">
      <div class="sidebar-label">ตำแหน่ง</div>
      <button class="btn-locate" id="btn-locate" onclick="locateUser()">📍 ตำแหน่งของฉัน</button>
      <button class="btn-reset" onclick="resetView()">🏫 กลับไปมหาวิทยาลัย</button>
      <button class="btn-clear" id="btn-clear" onclick="clearDirections()">🗺️ ล้างเส้นทาง</button>
    </div>

    <!-- Feed -->
    <div class="sidebar-section" style="flex:1;">
      <div class="sidebar-label">ถังขยะทั้งหมด</div>
      <div id="bin-feed"><div class="feed-empty">กำลังโหลด...</div></div>
    </div>
  </aside>
</div>

<!-- Add pin Modal -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-title">📍 เพิ่มถังขยะใหม่</div>
    <div class="modal-coords" id="modal-coords"></div>
    <label for="pin-name">ชื่อจุด / สถานที่</label>
    <input type="text" id="pin-name" placeholder="เช่น ถังขยะหน้าห้องสมุด" maxlength="60">
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ยกเลิก</button>
      <button class="btn-confirm" onclick="confirmAddPin()">✅ ยืนยัน</button>
    </div>
  </div>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- ═══════════════════════════════════════════
     Firebase SDK (compat v9 CDN — ไม่ต้อง build tool)
     ═══════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
  // ════════════════════════════════════════════
  //  🔧 CONFIG — แก้ค่าเหล่านี้ด้วย Firebase project ของคุณ
  //  1. ไปที่ https://console.firebase.google.com
  //  2. สร้าง project → Add app (Web)
  //  3. Copy firebaseConfig มาแทนด้านล่าง
  //  4. ใน Realtime Database → Rules ตั้งเป็น:
  //     { "rules": { ".read": true, ".write": true } }  (สำหรับ dev)
  // ════════════════════════════════════════════
  const FIREBASE_CONFIG = {
    apiKey:            "AIzaSyDlYHVqm2-jX4llgYUbOv0rTfMgxMElSg8",
    authDomain:        "bin-spot.firebaseapp.com",
    databaseURL:       "https://bin-spot-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:         "bin-spot",
    storageBucket:     "bin-spot.firebasestorage.app",
    messagingSenderId: "922106554955",
    appId:             "1:922106554955:web:06751762acfcd313f07bce"
  };

  // ════════════════════════════════════════════
  //  🗺️ GOOGLE MAPS API KEY — จำกัดใน Google Cloud Console
  //  ด้วย HTTP referrers ให้ตรงกับ domain ของคุณ
  // ════════════════════════════════════════════
  const MAPS_API_KEY = "AIzaSyBRnMK6VBkguPCKb1akiihG3ugBPDRxYVk";

  // ════════════════════════════════════════════
  //  State
  // ════════════════════════════════════════════
  let map, directionsService, directionsRenderer;
  let userMarker = null;
  let userLocation = null;
  let currentMode = 'view';            // 'view' | 'add'
  let pendingLatLng = null;            // พิกัดที่กำลังจะเพิ่ม
  let activeInfoWindow = null;         // InfoWindow ที่เปิดอยู่ (ปิดก่อนเปิดอัน new)
  let binMarkers = {};                 // { firebaseKey: google.maps.Marker }
  let db = null;

  const CHOM_BUENG = { lat: 13.62153, lng: 99.58899 };

  // ════════════════════════════════════════════
  //  Firebase init
  // ════════════════════════════════════════════
  function initFirebase() {
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      db = firebase.database();
    } catch(e) {
      showToast("⚠️ Firebase ยังไม่ได้ตั้งค่า — ข้อมูลจะไม่ sync");
      db = null;
    }
  }

  // ════════════════════════════════════════════
  //  Google Maps init (callback จาก script tag)
  // ════════════════════════════════════════════
  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      zoom: 17,
      center: CHOM_BUENG,
      gestureHandling: "greedy",
      disableDefaultUI: true,
      zoomControl: true,
      styles: [
        { featureType: "poi", elementType: "labels", stylers: [{ visibility: "off" }] },
        { featureType: "transit", stylers: [{ visibility: "off" }] }
      ]
    });

    // Directions
    directionsService = new google.maps.DirectionsService();
    directionsRenderer = new google.maps.DirectionsRenderer({
      suppressMarkers: true,
      polylineOptions: { strokeColor: "#e74c3c", strokeWeight: 5, strokeOpacity: 0.85 }
    });
    directionsRenderer.setMap(map);

    // University marker
    new google.maps.Marker({
      position: CHOM_BUENG, map,
      title: "มหาวิทยาลัยราชภัฏจอมบึง",
      icon: makeSvgIcon(`<circle cx="16" cy="16" r="12" fill="#0f3d25" stroke="white" stroke-width="2"/><text x="16" y="21" text-anchor="middle" fill="white" font-size="15">🏫</text>`, 32)
    });

    // คลิกแผนที่ (เฉพาะ mode "add")
    map.addListener('click', (e) => {
      if (currentMode !== 'add') return;
      pendingLatLng = { lat: e.latLng.lat(), lng: e.latLng.lng() };
      document.getElementById('modal-coords').textContent =
        `${pendingLatLng.lat.toFixed(6)}, ${pendingLatLng.lng.toFixed(6)}`;
      document.getElementById('pin-name').value = '';
      openModal();
    });

    // โหลดหมุดจาก Firebase
    initFirebase();
    loadBins();

    // ซ่อน loading
    document.getElementById('loading-overlay').classList.add('hidden');
  }

  // ════════════════════════════════════════════
  //  Firebase — โหลด + real-time sync
  // ════════════════════════════════════════════
  function loadBins() {
    if (!db) {
      // fallback: ใช้ข้อมูล hardcode เดิม
      loadFallbackBins();
      return;
    }

    const binsRef = db.ref('bins');

    // เพิ่มหมุดใหม่
    binsRef.on('child_added', (snapshot) => {
      const bin = snapshot.val();
      addBinMarker(snapshot.key, bin);
      updateFeed();
    });

    // ลบหมุด (optional — ถ้ามีระบบ admin ลบในอนาคต)
    binsRef.on('child_removed', (snapshot) => {
      const key = snapshot.key;
      if (binMarkers[key]) {
        binMarkers[key].setMap(null);
        delete binMarkers[key];
      }
      updateFeed();
    });
  }

  function loadFallbackBins() {
    const presets = [
      { lat: 13.620221, lng: 99.588116, title: "ถังขยะ ศูนย์ภาษา" },
      { lat: 13.620478, lng: 99.587010, title: "ถังขยะ ยิม1" },
      { lat: 13.620527, lng: 99.586165, title: "ถังขยะ 7-11" },
      { lat: 13.619539, lng: 99.586575, title: "ถังขยะ ตึกดนตรี" },
      { lat: 13.619505, lng: 99.587371, title: "ถังขยะ ตึกจัดการ" },
      { lat: 13.619405, lng: 99.587827, title: "ถังขยะ ห้องสมุด" },
      { lat: 13.619901, lng: 99.588831, title: "ถังขยะ ตึกอุตสาหกรรม" },
      { lat: 13.618796, lng: 99.586072, title: "ถังขยะ โรงเรียนอนุบาล" },
      { lat: 13.622638, lng: 99.587787, title: "ถังขยะ ตึกวิทย์" },
      { lat: 13.621831, lng: 99.588871, title: "ถังขยะ สวนราชพฤกษ์" },
      { lat: 13.621859, lng: 99.589493, title: "ถังขยะ ครุศาสตร์" },
      { lat: 13.621558, lng: 99.589905, title: "ถังขยะ ครุศาสตร์ 2" },
      { lat: 13.621230, lng: 99.590128, title: "ถังขยะ ตึกสาขาการบริหาร" },
      { lat: 13.620959, lng: 99.589259, title: "ถังขยะ ป้ายรถตู้" },
      { lat: 13.621525, lng: 99.589145, title: "ถังขยะ สาขาคณิต" }
    ];
    presets.forEach((bin, i) => {
      addBinMarker('preset_' + i, { ...bin, preset: true });
    });
    updateFeed();
  }

  // ════════════════════════════════════════════
  //  เพิ่มหมุดบนแผนที่
  // ════════════════════════════════════════════
  function addBinMarker(key, bin) {
    const isNew = !bin.preset;
    const color = isNew ? "#e67e22" : "#2980b9";

    const marker = new google.maps.Marker({
      position: { lat: bin.lat, lng: bin.lng },
      map,
      title: bin.title,
      icon: makeSvgIcon(
        `<circle cx="14" cy="14" r="10" fill="${color}" stroke="white" stroke-width="2"/>`+
        `<text x="14" y="18" text-anchor="middle" fill="white" font-size="13">🗑️</text>`,
        28
      )
    });

    marker.addListener('click', () => onMarkerClick(marker, bin));
    binMarkers[key] = marker;
    updateCount();
  }

  function onMarkerClick(marker, bin) {
    if (activeInfoWindow) activeInfoWindow.close();

    const iw = new google.maps.InfoWindow();
    activeInfoWindow = iw;

    if (currentMode === 'view' && userLocation) {
      // แสดง loading content ก่อน
      iw.setContent(infoHtml(bin.title, `<p style="color:#666;font-size:12px">กำลังคำนวณเส้นทาง...</p>`));
      iw.open(map, marker);

      // ล้างเส้นทางเก่าถูกต้อง
      directionsRenderer.setMap(null);
      directionsRenderer.setMap(map);

      directionsService.route({
        origin: userLocation,
        destination: { lat: bin.lat, lng: bin.lng },
        travelMode: google.maps.TravelMode.WALKING
      }, (result, status) => {
        if (status === "OK") {
          directionsRenderer.setDirections(result);
          const leg = result.routes[0].legs[0];
          iw.setContent(infoHtml(bin.title,
            `<div style="background:#f0f8f0;padding:8px;border-radius:6px;margin:6px 0">
              <p style="margin:3px 0;color:#1a5c38;font-weight:700;font-size:13px">📏 ${leg.distance.text}</p>
              <p style="margin:3px 0;color:#1a5c38;font-weight:700;font-size:13px">⏱️ ${leg.duration.text}</p>
            </div>
            <p style="color:#888;font-size:11px">กดปุ่ม "ล้างเส้นทาง" เพื่อยกเลิก</p>`
          ));
          document.getElementById('btn-clear').classList.add('visible');
        } else {
          iw.setContent(infoHtml(bin.title, `<p style="color:#e74c3c;font-size:13px">ไม่สามารถหาเส้นทางได้</p>`));
        }
      });
    } else if (currentMode === 'view' && !userLocation) {
      iw.setContent(infoHtml(bin.title,
        `<p style="color:#e74c3c;font-size:13px">กรุณากด "ตำแหน่งของฉัน" ก่อน</p>`
      ));
      iw.open(map, marker);
    } else {
      iw.setContent(infoHtml(bin.title, `<p style="color:#666;font-size:12px">📍 ${bin.lat.toFixed(5)}, ${bin.lng.toFixed(5)}</p>`));
      iw.open(map, marker);
    }
  }

  function infoHtml(title, body) {
    return `<div style="padding:10px;min-width:180px;font-family:'Sarabun',sans-serif">
      <h3 style="margin:0 0 8px;color:#0f3d25;font-size:14px">${title}</h3>
      ${body}
    </div>`;
  }

  // ════════════════════════════════════════════
  //  ยืนยันเพิ่มหมุด → บันทึก Firebase
  // ════════════════════════════════════════════
  function confirmAddPin() {
    const name = document.getElementById('pin-name').value.trim();
    if (!name) {
      document.getElementById('pin-name').focus();
      showToast("⚠️ กรุณาใส่ชื่อจุดก่อน");
      return;
    }
    if (!pendingLatLng) return;

    const newBin = {
      lat: pendingLatLng.lat,
      lng: pendingLatLng.lng,
      title: name,
      timestamp: Date.now(),
      preset: false
    };

    if (db) {
      db.ref('bins').push(newBin)
        .then(() => showToast("✅ เพิ่มถังขยะสำเร็จ! ทุกคนจะเห็นทันที"))
        .catch(() => showToast("❌ บันทึกล้มเหลว กรุณาลองใหม่"));
    } else {
      // ไม่มี Firebase — เพิ่มเฉพาะ local
      const localKey = 'local_' + Date.now();
      addBinMarker(localKey, newBin);
      updateFeed();
      showToast("📍 เพิ่มหมุดเฉพาะเครื่อง (Firebase ยังไม่ได้ตั้งค่า)");
    }

    closeModal();
    setMode('view');
  }

  // ════════════════════════════════════════════
  //  UI helpers
  // ════════════════════════════════════════════
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btn-view-mode').classList.toggle('active', mode === 'view');
    document.getElementById('btn-add-mode').classList.toggle('active', mode === 'add');
    document.getElementById('add-hint').classList.toggle('visible', mode === 'add');
    map.setOptions({ draggableCursor: mode === 'add' ? 'crosshair' : '' });
  }

  function openModal()  { document.getElementById('modal').classList.add('open'); setTimeout(() => document.getElementById('pin-name').focus(), 220); }
  function closeModal() { document.getElementById('modal').classList.remove('open'); pendingLatLng = null; }

  // ปิด modal เมื่อคลิก backdrop
  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Enter ใน input → confirm
  document.getElementById('pin-name').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') confirmAddPin();
    if (e.key === 'Escape') closeModal();
  });

  function locateUser() {
    const btn = document.getElementById('btn-locate');
    if (!navigator.geolocation) { showToast("เบราว์เซอร์ไม่รองรับ GPS"); return; }

    btn.textContent = "🔄 กำลังค้นหา...";
    btn.disabled = true;

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        if (userMarker) userMarker.setMap(null);
        userMarker = new google.maps.Marker({
          position: userLocation, map,
          title: "ตำแหน่งของคุณ",
          icon: makeSvgIcon(
            `<circle cx="12" cy="12" r="8" fill="#e74c3c" stroke="white" stroke-width="2"/>
             <circle cx="12" cy="12" r="3" fill="white"/>`, 24
          ),
          zIndex: 999
        });
        map.panTo(userLocation);
        map.setZoom(18);
        btn.textContent = "✅ พบตำแหน่งแล้ว";
        btn.disabled = false;
        showToast("📍 พบตำแหน่งของคุณแล้ว — คลิกถังขยะเพื่อดูเส้นทาง");
        setTimeout(() => { btn.textContent = "📍 ตำแหน่งของฉัน"; }, 4000);
      },
      (err) => {
        btn.textContent = "❌ ไม่พบตำแหน่ง";
        btn.disabled = false;
        const msgs = { 1: "กรุณาอนุญาตการเข้าถึงตำแหน่ง", 2: "ข้อมูลตำแหน่งไม่พร้อมใช้งาน", 3: "หมดเวลาค้นหา กรุณาลองใหม่" };
        showToast("⚠️ " + (msgs[err.code] || "ไม่สามารถหาตำแหน่งได้"));
        setTimeout(() => { btn.textContent = "📍 ตำแหน่งของฉัน"; }, 3000);
      },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 30000 }
    );
  }

  function resetView() {
    map.panTo(CHOM_BUENG);
    map.setZoom(17);
  }

  function clearDirections() {
    directionsRenderer.setMap(null);
    directionsRenderer.setMap(map);
    document.getElementById('btn-clear').classList.remove('visible');
    if (activeInfoWindow) { activeInfoWindow.close(); activeInfoWindow = null; }
  }

  function updateCount() {
    document.getElementById('binCount').textContent = Object.keys(binMarkers).length;
  }

  function updateFeed() {
    updateCount();
    const feed = document.getElementById('bin-feed');
    const keys = Object.keys(binMarkers);
    if (!keys.length) { feed.innerHTML = '<div class="feed-empty">ยังไม่มีข้อมูล</div>'; return; }

    // สร้างรายการจาก binMarkers
    let html = '';
    keys.slice().reverse().forEach(key => {
      const m = binMarkers[key];
      const isPreset = key.startsWith('preset_');
      const badge = isPreset
        ? '<span class="feed-badge badge-preset">ข้อมูลเดิม</span>'
        : '<span class="feed-badge badge-new">ใหม่</span>';
      html += `<div class="feed-item" onclick="panToMarker('${key}')">
        <div class="feed-item-title">${m.getTitle()}</div>
        <div class="feed-item-meta">${badge}</div>
      </div>`;
    });
    feed.innerHTML = html;
  }

  function panToMarker(key) {
    const marker = binMarkers[key];
    if (!marker) return;
    map.panTo(marker.getPosition());
    map.setZoom(19);
    google.maps.event.trigger(marker, 'click');
  }

  function showToast(msg) {
    const wrap = document.getElementById('toast-wrap');
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  function makeSvgIcon(innerSvg, size) {
    return {
      url: "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(
        `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${innerSvg}</svg>`
      ),
      scaledSize: new google.maps.Size(size, size)
    };
  }

  // ════════════════════════════════════════════
  //  โหลด Google Maps
  // ════════════════════════════════════════════
  window.addEventListener('load', () => {
    const s = document.createElement('script');
    s.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_API_KEY}&callback=initMap&language=th`;
    s.async = true; s.defer = true;
    document.head.appendChild(s);
  });
</script>
</body>
</html>
